<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面试网站 · 标签切换优化</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }
        body {
            min-height: 100vh;
            background: #999999; 
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .game-panel {
            background: #101217;    
            width: 100%;
            max-width: 480px;
            border-radius: 28px;
            border: 1px solid #2a2e3a;
            padding: 2.5rem 2rem 2.8rem;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8);
        }

        .tab-row {
            display: flex;
            gap: 2.2rem;
            margin-bottom: 2.8rem;
            border-bottom: 1px solid #252a33;
            padding-bottom: 0.9rem;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: #7b8499;  
            font-size: 1.6rem;
            font-weight: 550;
            letter-spacing: -0.3px;
            padding: 0 0.2rem 0.6rem 0.2rem;
            cursor: pointer;
            transition: 0.15s ease;
            border-bottom: 2px solid transparent;
            margin-bottom: -0.9rem;
            opacity: 0.8;
        }

        .tab-btn.active {
            color: #ffffff;
            border-bottom-color: #3e70c9; 
            opacity: 1;
            font-weight: 600;
        }
        .form-container {
            position: relative;
            min-height: 380px;
        }
        .form-box {
            background: transparent;   
            width: 100%;
            transition: opacity 0.2s ease;
        }

        .form-box.hidden {
            display: none;
        }

        .form-title {
            color: #e5e9f0;
            font-size: 1.9rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .form-title span {
            background: #232731;
            color: #a3b3d8;
            font-size: 0.85rem;
            font-weight: 500;
            padding: 0.2rem 0.9rem;
            border-radius: 30px;
            border: 1px solid #2f3542;
        }
        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            color: #9aa4bf;
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.4rem;
        }

        .input-field {
            width: 100%;
            background: #0c0e14;
            border: 1px solid #2a303d;
            border-radius: 12px;
            padding: 0.9rem 1.2rem;
            font-size: 1rem;
            color: #f0f4ff;
            outline: none;
            transition: 0.15s;
        }

        .input-field:focus {
            border-color: #3e70c9;   
            background: #11151e;
        }

        .input-field::placeholder {
            color: #3d4355;
            font-weight: 400;
            font-size: 0.9rem;
        }
        .helper-line {
            display: flex;
            justify-content: flex-end;
            margin: 0.2rem 0 2rem 0;
        }

        .forgot-link {
            color: #6d799b;
            font-size: 0.8rem;
            text-decoration: none;
            border-bottom: 1px dashed #39405a;
            letter-spacing: 0.2px;
        }

        .forgot-link:hover {
            color: #a3b8f0;
            border-bottom-color: #5f7dcd;
        }
        .terms-row {
            margin: 1.2rem 0 2rem 0;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: #838fb1;
            font-size: 0.8rem;
        }

        .terms-row input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
            background: #1b1f2b;
            border: 1px solid #3d455b;
            accent-color: #3e70c9;
        }

        .terms-row a {
            color: #b3c7ff;
            text-decoration: none;
            border-bottom: 1px dotted #4f6191;
        }

        .terms-row a:hover {
            color: white;
        }
        .action-btn {
            background: #2c3f66;        
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 0.9rem 1.8rem;
            border-radius: 16px;
            width: 100%;
            cursor: pointer;
            transition: 0.1s linear;
            letter-spacing: 0.5px;
            border: 1px solid #3f5890;
            margin-top: 0.5rem;
        }

        .action-btn:hover {
            background: #345797;
            border-color: #5b83d9;
        }

        .divider {
            display: flex;
            align-items: center;
            color: #3e465b;
            font-size: 0.75rem;
            margin: 1.8rem 0 1rem 0;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #282e3b;
        }

        .divider span {
            padding: 0 0.8rem;
        }

        .action-btn.secondary {
            background: transparent;
            border: 1.5px solid #364153;
            color: #b7c2e0;
            box-shadow: none;
        }

        .action-btn.secondary:hover {
            border-color: #6078b0;
            color: #e5ecff;
            background: rgba(60, 100, 180, 0.1);
        }
        .footer-note {
            text-align: center;
            margin-top: 2.2rem;
            color: #4e5670;
            font-size: 0.8rem;
            border-top: 1px solid #202431;
            padding-top: 1.5rem;
        }
        .footer-note i {
            font-style: normal;
            background: #191e28;
            padding: 0.2rem 1rem;
            border-radius: 40px;
            border: 1px solid #2e3440;
        }
        @media (max-width: 480px) {
            .game-panel {
                padding: 1.8rem 1.2rem;
            }
            .tab-btn {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-panel">
        <div class="tab-row">
            <button class="tab-btn active" id="tabLogin">登录</button>
            <button class="tab-btn" id="tabRegister">注册</button>
        </div>

        <div class="form-container">
            <!-- 登录表单区块 -->
            <div class="form-box" id="loginForm">
                <div class="form-title">
                    <span>登录</span>
                </div>
                <div class="input-group">
                    <label>邮箱 / 用户名</label>
                    <input class="input-field" type="email" placeholder="game@example.com" value="">
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input class="input-field" type="password" placeholder="········">
                </div>
                <div class="helper-line">
                    <a href="#" class="forgot-link">忘记密码</a>
                </div>
                <button class="action-btn">登录</button>
                <!-- 简洁分割线 + 快速注册入口（强化跳转） -->
                <div class="divider">
                    <span>还没有账号？</span>
                </div>
                <button class="action-btn secondary" id="jumpToRegisterBtn">立即注册</button>
            </div>

            <!-- 注册表单区块 (hidden默认隐藏) -->
            <div class="form-box hidden" id="registerForm">
                <div class="form-title">
               <span>新账号</span>
                </div>
                <div class="input-group">
                    <label>用户名</label>
                    <input class="input-field" type="text" placeholder="XXX">
                </div>
                <div class="input-group">
                    <label>电子邮箱</label>
                    <input class="input-field" type="email" placeholder="Your@mail.com">
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input class="input-field" type="password" placeholder="至少8位">
                </div>
                <div class="input-group">
                    <label>确认密码</label>
                    <input class="input-field" type="password" placeholder="再次输入">
                </div>

                <div class="terms-row">
                    <input type="checkbox" id="terms" checked>
                    <label for="terms">我已阅读并同意 <a href="#">用户协议</a> 和 <a href="#">隐私条款</a></label>
                </div>

                <button class="action-btn">注册并登录</button>
                <div style="color:#404760; font-size:0.7rem; text-align:center; margin-top:1.5rem;">注册即代表同意服务条款</div>
                <!-- 同时保留返回登录的快速按钮（体验对称） -->
                <div class="divider" style="margin-top:1.8rem;">
                    <span>已有账号？</span>
                </div>
                <button class="action-btn secondary" id="jumpToLoginBtn">返回登录</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');

            // 获取两个内部跳转按钮
            const jumpToRegisterBtn = document.getElementById('jumpToRegisterBtn');
            const jumpToLoginBtn = document.getElementById('jumpToLoginBtn');

            // 激活tab切换函数
            function setActiveTab(tab) {
                // 更新按钮active样式
                tabLogin.classList.toggle('active', tab === 'login');
                tabRegister.classList.toggle('active', tab === 'register');
                // 显示/隐藏对应的表单
                loginForm.classList.toggle('hidden', tab !== 'login');
                registerForm.classList.toggle('hidden', tab !== 'register');
            }

            // 点击顶部tab
            tabLogin.addEventListener('click', (e) => {
                e.preventDefault();
                setActiveTab('login');
            });
            tabRegister.addEventListener('click', (e) => {
                e.preventDefault();
                setActiveTab('register');
            });

            // 关键需求: 点击「注册」可以跳转到注册标签 —— 即“立即注册”按钮 (位于登录卡片内)
            if (jumpToRegisterBtn) {
                jumpToRegisterBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    setActiveTab('register');
                });
            }

            // （可选但推荐对称）注册页内的“返回登录”也能跳转回登录标签
            if (jumpToLoginBtn) {
                jumpToLoginBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    setActiveTab('login');
                });
            }

            // 确保默认显示登录 (与html初始一致)
            setActiveTab('login');
        })();
    </script>
</body>
</html>
